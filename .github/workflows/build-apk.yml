name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - 'copilot/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_recorder
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_recorder
        run: flutter build apk --release

      - name: Verify APK exists
        run: test -f flutter_recorder/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}-${{ github.sha }}
          path: flutter_recorder/build/app/outputs/flutter-apk/app-release.apk

      - name: Stage APK for GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp "flutter_recorder/build/app/outputs/flutter-apk/app-release.apk" \
            "flutter_recorder-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_recorder-${{ github.ref_name }}.apk
          generate_release_notes: true
