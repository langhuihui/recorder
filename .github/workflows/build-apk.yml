name: Build Android APK

# No push-to-main: avoids a green run on every merge while tag releases build separately.
# - PRs: verify APK still builds before merge
# - workflow_dispatch: manual build + artifact
# - Tags v*: see publish-release-apk.yml (Release APK attachment)
on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_recorder
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_recorder
        run: flutter build apk --release

      - name: Verify APK exists
        run: test -f flutter_recorder/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}-${{ github.sha }}
          path: flutter_recorder/build/app/outputs/flutter-apk/app-release.apk
