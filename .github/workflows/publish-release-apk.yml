name: Publish APK to GitHub Release

# Only tag pushes — avoids branch runs where github.ref is refs/heads/main and release steps are skipped.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build and attach APK to release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_recorder
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_recorder
        run: flutter build apk --release

      - name: Verify APK exists
        run: test -f flutter_recorder/build/app/outputs/flutter-apk/app-release.apk

      - name: Stage APK for release upload
        run: |
          cp "flutter_recorder/build/app/outputs/flutter-apk/app-release.apk" \
            "flutter_recorder-${{ github.ref_name }}.apk"

      - name: Verify staged asset
        run: test -f "flutter_recorder-${{ github.ref_name }}.apk"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: flutter_recorder-${{ github.ref_name }}.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
