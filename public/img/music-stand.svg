<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="none">
  <!-- Stand pole -->
  <rect x="95" y="80" width="10" height="170" rx="3" fill="currentColor" opacity="0.9"/>
  <!-- Tripod base -->
  <line x1="100" y1="250" x2="50" y2="290" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="100" y1="250" x2="150" y2="290" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="100" y1="250" x2="100" y2="295" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <!-- Desk / sheet holder -->
  <rect x="40" y="20" width="120" height="70" rx="6" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="3" stroke-opacity="0.9"/>
  <!-- Desk rim / lip -->
  <rect x="38" y="82" width="124" height="8" rx="3" fill="currentColor" opacity="0.7"/>
  <!-- Sheet music lines -->
  <line x1="58" y1="36" x2="142" y2="36" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <line x1="58" y1="42" x2="142" y2="42" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <line x1="58" y1="48" x2="142" y2="48" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <line x1="58" y1="54" x2="142" y2="54" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <line x1="58" y1="60" x2="142" y2="60" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <!-- Notes -->
  <ellipse cx="75" cy="48" rx="4" ry="3" fill="currentColor" opacity="0.5" transform="rotate(-15 75 48)"/>
  <line x1="79" y1="48" x2="79" y2="32" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="110" cy="42" rx="4" ry="3" fill="currentColor" opacity="0.5" transform="rotate(-15 110 42)"/>
  <line x1="114" y1="42" x2="114" y2="26" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="130" cy="54" rx="4" ry="3" fill="currentColor" opacity="0.5" transform="rotate(-15 130 54)"/>
  <line x1="134" y1="54" x2="134" y2="38" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <!-- Adjustment knob -->
  <circle cx="100" cy="140" r="6" fill="currentColor" opacity="0.6"/>
</svg>
