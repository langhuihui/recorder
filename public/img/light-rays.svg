<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#e8c87e" stop-opacity="0.30"/>
      <stop offset="35%" stop-color="#e8c87e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e8c87e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#fff0c8" stop-opacity="0.24"/>
      <stop offset="30%" stop-color="#fff0c8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#fff0c8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#c9a04a" stop-opacity="0.22"/>
      <stop offset="30%" stop-color="#c9a04a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c9a04a" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
    <filter id="blur2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30"/>
    </filter>
    <filter id="blur3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>
  <!-- Main wide beam, heavy blur -->
  <polygon points="0,0 60,0 1100,500 900,600" fill="url(#g1)" filter="url(#blur2)"/>
  <!-- Steeper beam, medium blur -->
  <polygon points="0,0 40,10 700,800 520,800" fill="url(#g2)" filter="url(#blur1)"/>
  <!-- Narrow sharp beam, light blur -->
  <polygon points="0,0 25,5 1200,380 1150,440" fill="url(#g3)" filter="url(#blur3)"/>
</svg>
